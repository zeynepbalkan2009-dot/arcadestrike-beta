services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arcade
      POSTGRES_PASSWORD: arcade
      POSTGRES_DB: arcadestrike
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcade -d arcadestrike"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 2567
      DATABASE_URL: postgresql://arcade:arcade@postgres:5432/arcadestrike?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-compose-secret
      CLIENT_ORIGIN: http://localhost:8080
    ports:
      - "2567:2567"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres-data:
