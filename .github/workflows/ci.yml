name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arcade
          POSTGRES_PASSWORD: arcade
          POSTGRES_DB: arcadestrike
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U arcade -d arcadestrike"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://arcade:arcade@localhost:5432/arcadestrike?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:validate
      - run: npx prisma migrate diff --from-empty --to-schema-datamodel apps/server/prisma/schema.prisma --script
      - run: npm run lint
      - run: npm run test --workspace=apps/server -- --runInBand --ci
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
          tags: arcadestrike-server:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/client/Dockerfile
          push: false
          tags: arcadestrike-client:ci
